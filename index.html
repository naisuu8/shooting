<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let crosshairX = 300, crosshairY = 200;
let score = 0;
let target = {x: 100, y: 100, size: 80};

// Load your photo as the target
const targetImg = new Image();
targetImg.src = "target.png"; // rename your uploaded photo to target.png

// --- Keyboard aiming ---
document.addEventListener("keydown", function(e) {
  if (e.key === "ArrowLeft") crosshairX -= 10;
  if (e.key === "ArrowRight") crosshairX += 10;
  if (e.key === "ArrowUp") crosshairY -= 10;
  if (e.key === "ArrowDown") crosshairY += 10;
  if (e.key === " ") shoot();
});

// --- Mouse aiming ---
canvas.addEventListener("mousemove", function(e) {
  const rect = canvas.getBoundingClientRect();
  crosshairX = e.clientX - rect.left;
  crosshairY = e.clientY - rect.top;
});

// --- Shooting ---
function shoot() {
  if (crosshairX > target.x && crosshairX < target.x + target.size &&
      crosshairY > target.y && crosshairY < target.y + target.size) {
    score++;
    // Move target to random new position
    target.x = Math.random() * (canvas.width - target.size);
    target.y = Math.random() * (canvas.height - target.size);
  }
}

// --- Drawing ---
function drawCrosshair() {
  ctx.strokeStyle = "black";
  ctx.beginPath();
  ctx.moveTo(crosshairX-20, crosshairY);
  ctx.lineTo(crosshairX+20, crosshairY);
  ctx.moveTo(crosshairX, crosshairY-20);
  ctx.lineTo(crosshairX, crosshairY+20);
  ctx.stroke();
}

function drawTarget() {
  ctx.drawImage(targetImg, target.x, target.y, target.size, target.size);
}

function gameLoop() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawCrosshair();
  drawTarget();

  ctx.fillStyle = "black";
  ctx.font = "20px Arial";
  ctx.fillText("Score: " + score, 10, 20);

  requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
